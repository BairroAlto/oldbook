<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Bíblico: Texto para JSON</title>
    <style>
        :root {
            --bg-color: #121214;
            --panel-color: #1f1f23;
            --accent-color: #00b894;
            --text-color: #e1e1e6;
            --border-color: #323238;
            --success-color: #00e676;
            --error-color: #ff5252;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            gap: 20px;
            height: 100vh;
            box-sizing: border-box;
            margin: 0;
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 300px;
        }

        .col-left { flex: 0 0 320px; }

        h1 { color: var(--accent-color); font-size: 1rem; margin: 0 0 10px 0; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .card {
            background: var(--panel-color);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        textarea {
            width: 100%;
            flex: 1;
            background: #09090a;
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 15px;
            border-radius: 4px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.9rem;
            resize: none;
            line-height: 1.6;
            outline: none;
        }
        textarea:focus { border-color: var(--accent-color); }

        button {
            background: var(--accent-color);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border: none;
            padding: 14px;
            border-radius: 4px;
            transition: transform 0.1s, filter 0.2s;
            font-size: 0.9rem;
        }
        button:hover { filter: brightness(1.1); }
        button:active { transform: scale(0.98); }

        .book-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2px;
            overflow-y: auto;
            background: #09090a;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }
        
        .book-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        .book-item:hover { background: #29292e; }
        .book-item input { cursor: pointer; accent-color: var(--accent-color); }

        #logArea {
            background: #000;
            color: #888;
            padding: 12px;
            font-size: 0.8rem;
            border-radius: 4px;
            height: 180px;
            overflow-y: auto;
            margin-top: 10px;
            border: 1px solid var(--border-color);
            line-height: 1.6;
        }

        .log-chapter { color: #fff; font-weight: bold; border-left: 3px solid var(--accent-color); padding-left: 8px; margin: 5px 0; }
        .log-success { color: var(--success-color); font-weight: bold; }
        .log-info { color: #3498db; }
    </style>
</head>
<body>

    <!-- COLUNA 1: SELEÇÃO -->
    <div class="column col-left">
        <div class="card" style="height: 100%;">
            <h1>1. Selecione o Livro</h1>
            <div id="bookSelectionContainer" class="book-grid"></div>
        </div>
    </div>

    <!-- COLUNA 2: TEXTO E AÇÃO -->
    <div class="column">
        <div class="card" style="flex: 1;">
            <h1>2. Texto da Versão</h1>
            <textarea id="rawTextInput" placeholder="Cole aqui o texto. Lembre-se: o versículo 1 define o início de um novo capítulo."></textarea>
            
            <div id="logArea">Aguardando colagem de texto...</div>
            
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="processAndCopy()" style="flex: 2;">🔥 Gerar JSON e Copiar</button>
                <button onclick="clearAll()" style="flex: 1; background: #323238; color: #fff;">Limpar Tudo</button>
            </div>
        </div>
    </div>

    <script>
        const BIBLE_DATA = [
            { id: 1, nome: "Génesis" }, { id: 2, nome: "Êxodo" }, { id: 3, nome: "Levítico" }, { id: 4, nome: "Números" }, { id: 5, nome: "Deuteronômio" },
            { id: 6, nome: "Josué" }, { id: 7, nome: "Juízes" }, { id: 8, nome: "Rute" }, { id: 9, nome: "1 Samuel" }, { id: 10, nome: "2 Samuel" },
            { id: 11, nome: "1 Reis" }, { id: 12, nome: "2 Reis" }, { id: 13, nome: "1 Crônicas" }, { id: 14, nome: "2 Crônicas" }, { id: 15, nome: "Esdras" },
            { id: 16, nome: "Neemias" }, { id: 17, nome: "Ester" }, { id: 18, nome: "Jó" }, { id: 19, nome: "Salmos" }, { id: 20, nome: "Provérbios" },
            { id: 21, nome: "Eclesiastes" }, { id: 22, nome: "Cântico de Salomão" }, { id: 23, nome: "Isaías" }, { id: 24, nome: "Jeremias" }, { id: 25, nome: "Lamentações" },
            { id: 26, nome: "Ezequiel" }, { id: 27, nome: "Daniel" }, { id: 28, nome: "Oseias" }, { id: 29, nome: "Joel" }, { id: 30, nome: "Amós" },
            { id: 31, nome: "Obadias" }, { id: 32, nome: "Jonas" }, { id: 33, nome: "Miqueias" }, { id: 34, nome: "Naum" }, { id: 35, nome: "Habacuque" },
            { id: 36, nome: "Sofonias" }, { id: 37, nome: "Ageu" }, { id: 38, nome: "Zacarias" }, { id: 39, nome: "Malaquias" }, { id: 40, nome: "Mateus" },
            { id: 41, nome: "Marcos" }, { id: 42, nome: "Lucas" }, { id: 43, nome: "João" }, { id: 44, nome: "Atos" }, { id: 45, nome: "Romanos" },
            { id: 46, nome: "1 Coríntios" }, { id: 47, nome: "2 Coríntios" }, { id: 48, nome: "Gálatas" }, { id: 49, nome: "Efésios" }, { id: 50, nome: "Filipenses" },
            { id: 51, nome: "Colossenses" }, { id: 52, nome: "1 Tessalonicenses" }, { id: 53, nome: "2 Tessalonicenses" }, { id: 54, nome: "1 Timóteo" }, { id: 55, nome: "2 Timóteo" },
            { id: 56, nome: "Tito" }, { id: 57, nome: "Filemom" }, { id: 58, nome: "Hebreus" }, { id: 59, nome: "Tiago" }, { id: 60, nome: "1 Pedro" },
            { id: 61, nome: "2 Pedro" }, { id: 62, nome: "1 João" }, { id: 63, nome: "2 João" }, { id: 64, nome: "3 João" }, { id: 65, nome: "Judas" }, { id: 66, nome: "Apocalipse" }
        ];

        window.onload = () => {
            const container = document.getElementById('bookSelectionContainer');
            BIBLE_DATA.forEach(book => {
                const div = document.createElement('div');
                div.className = 'book-item';
                div.onclick = () => div.querySelector('input').checked = true;
                div.innerHTML = `<input type="radio" name="selectedBook" value="${book.nome}" id="b_${book.id}">
                                 <label for="b_${book.id}">${book.nome}</label>`;
                container.appendChild(div);
            });
        };

        function addLog(msg, className = '') {
            const logArea = document.getElementById('logArea');
            const div = document.createElement('div');
            div.className = className;
            div.innerHTML = msg;
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
        }

        function clearAll() {
            document.getElementById('rawTextInput').value = '';
            document.getElementById('logArea').innerHTML = 'Aguardando...';
        }

        async function processAndCopy() {
            const rawText = document.getElementById('rawTextInput').value.trim();
            const selectedRadio = document.querySelector('input[name="selectedBook"]:checked');
            const logArea = document.getElementById('logArea');
            
            if (!selectedRadio) return alert("Selecione um livro na lista lateral!");
            if (!rawText) return alert("Cole o texto da bíblia primeiro!");

            logArea.innerHTML = ""; // Limpa log para novo processamento
            const bookName = selectedRadio.value;
            addLog(`🚀 Processando: <b>${bookName}</b>`, 'log-info');

            const bibleJson = { [bookName]: {} };
            let currentChapter = 0;
            let currentVerse = 0;
            let chapterVerseCount = 0;

            const lines = rawText.split('\n');

            lines.forEach((line, index) => {
                const trimmedLine = line.trim();
                if (!trimmedLine) return;

                // Regex para identificar número no início da linha
                const match = trimmedLine.match(/^(\d+)\s+([\s\S]+)/);

                if (match) {
                    const verseNum = parseInt(match[1]);
                    const verseContent = match[2].trim();

                    // Se encontrar versículo 1, fecha a contagem do anterior e abre novo capítulo
                    if (verseNum === 1) {
                        if (currentChapter > 0) {
                            addLog(`Capítulo ${currentChapter}: ${chapterVerseCount} versículos identificados.`, 'log-chapter');
                        }
                        currentChapter++;
                        chapterVerseCount = 0;
                        bibleJson[bookName][currentChapter] = {};
                    }

                    if (currentChapter === 0) {
                        currentChapter = 1;
                        bibleJson[bookName][currentChapter] = {};
                    }

                    bibleJson[bookName][currentChapter][verseNum] = verseContent;
                    currentVerse = verseNum;
                    chapterVerseCount++;
                } else {
                    // Texto sem número no início é continuação (parágrafo)
                    if (currentChapter > 0 && currentVerse > 0) {
                        bibleJson[bookName][currentChapter][currentVerse] += "\n" + trimmedLine;
                    }
                }
            });

            // Log para o último capítulo processado
            if (currentChapter > 0) {
                addLog(`Capítulo ${currentChapter}: ${chapterVerseCount} versículos identificados.`, 'log-chapter');
            }

            // Converter para String e Copiar
            const finalJson = JSON.stringify(bibleJson, null, 2);
            
            try {
                await navigator.clipboard.writeText(finalJson);
                addLog("<br>✅ <b>JSON copiado para a área de transferência!</b>", "log-success");
                alert("Sucesso! O JSON do livro " + bookName + " foi copiado.");
            } catch (err) {
                addLog("<br>❌ Erro ao copiar: " + err, "log-error");
            }
        }
    </script>
</body>
</html>
