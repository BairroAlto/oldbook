<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Transcrição JW - V10.5 (Com Contexto)</title>
    <style>
        :root { --primary: #4a148c; --discurso: #e67e22; --video: #2980b9; --musical: #9b59b6; --subtema: #34495e; }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 150px; font-family: monospace; padding: 12px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 10px; box-sizing: border-box; }
        
        /* Layout ajustado para 4 colunas */
        .video-meta { display: grid; grid-template-columns: 80px 150px 220px 1fr; gap: 15px; margin: 20px 0; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        
        .video-meta div { display: flex; flex-direction: column; }
        .video-meta label { font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        
        /* Estilo para Input e Select */
        .video-meta input, .video-meta select { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; background: white; }
        
        .block-row { display: flex; align-items: center; gap: 10px; background: white; border: 1px solid #eee; padding: 5px 10px; margin-bottom: 2px; border-radius: 4px; height: 32px; overflow: hidden; position: relative; }
        .type-select { padding: 4px; border-radius: 4px; border: 1px solid #ccc; font-size: 11px; font-weight: bold; text-transform: uppercase; width: 130px; cursor: pointer; }
        .num-tag { min-width: 40px; font-size: 11px; color: #999; font-weight: bold; text-align: center; }
        .block-text { flex: 1; font-size: 13px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; outline: none; }
        .block-text:focus { white-space: normal; overflow: visible; background: #fffceb; position: absolute; left: 200px; right: 50px; z-index: 10; border: 1px solid var(--primary); padding: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); height: auto; min-height: 32px; }
        .type-discurso { border-left: 5px solid var(--discurso); background: #fef5ec; }
        .type-video { border-left: 5px solid var(--video); background: #ebf5fb; }
        .type-musical { border-left: 5px solid var(--musical); background: #f5eef8; }
        .type-subtema { border-left: 5px solid #ddd; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; width: 100%; font-size: 16px; margin-bottom: 20px; }
        .btn-json { background: #27ae60; color: white; width: 100%; height: 55px; font-size: 18px; margin-top: 25px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Organizador de Transcrição JW - V10.5</h2>
    <textarea id="entrada" placeholder="Cole o VTT aqui..."></textarea>
    <button class="btn-main" onclick="processarLegenda()">1. GERAR LINHAS PARA EDIÇÃO</button>

    <div id="editorArea" style="display:none;">
        <div class="video-meta">
            <div>
                <label>ID</label>
                <input type="text" id="videoId" placeholder="ex: 01">
            </div>
            <div>
                <label>Referência</label>
                <input type="text" id="videoRef" placeholder="ex: jwb-134-9.v">
            </div>
            <div>
                <label>Contexto</label>
                <select id="videoContext">
                    <option value="Discurso">Discurso</option>
                    <option value="Adoração Matinal">Adoração Matinal</option>
                    <option value="Broadcasting">Broadcasting</option>
                    <option value="Eventos Especiais">Eventos Especiais</option>
                    <option value="Formatura de Gileade">Formatura de Gileade</option>
                    <option value="Reunião Anual">Reunião Anual</option>
                    <option value="Congresso">Congresso</option>
                    <option value="Assembleia">Assembleia</option>
                    <option value="Reunião Semana">Reunião Semana</option>
                    <option value="Reunião Fim de Semana">Reunião Fim de Semana</option>
                </select>
            </div>
            <div>
                <label>Título</label>
                <input type="text" id="videoTitle" placeholder="Título oficial">
            </div>
        </div>
        <div id="blocosContainer"></div>
        <button class="btn-json" onclick="gerarJSON()">🏁 EXPORTAR JSON CONSOLIDADO</button>
    </div>
</div>

<script>
    const BIBLE_MAP = {
        "Gên": "Génesis", "Gén": "Génesis", "Gênesis": "Génesis", "Êx": "Êxodo", "Êxo": "Êxodo", "Lev": "Levítico", "Núm": "Números", "De": "Deuteronómio", "Deuteronômio": "Deuteronómio", "Deut": "Deuteronómio", "Jos": "Josué", "Jz": "Juízes", "Ru": "Rute", "1 Sam": "1 Samuel", "2 Sam": "2 Samuel", "1 Rs": "1 Reis", "2 Rs": "2 Reis", "1 Crô": "1 Crónicas", "1 Cró": "1 Crónicas", "2 Crô": "2 Crónicas", "2 Cró": "2 Crónicas", "Esd": "Esdras", "Nee": "Neemias", "Est": "Ester", "Jó": "Jó", "Sal": "Salmos", "Salmo": "Salmos", "Pro": "Provérbios", "Ecl": "Eclesiastes", "Cân": "Cântico de Salomão", "Isa": "Isaías", "Jer": "Jeremias", "La": "Lamentações", "Ez": "Ezequiel", "Eze": "Ezequiel", "Da": "Daniel", "Dan": "Daniel", "Os": "Oséias", "Jl": "Joel", "Am": "Amós", "Obd": "Obadias", "Jon": "Jonas", "Miq": "Miqueias", "Na": "Naum", "Hab": "Habacuque", "Sof": "Sofonias", "Ag": "Ageu", "Za": "Zacarias", "Mal": "Malaquias", "Mat": "Mateus", "Mr": "Marcos", "Mar": "Marcos", "Luc": "Lucas", "Jo": "João", "At": "Atos", "Rom": "Romanos", "1 Cor": "1 Coríntios", "2 Cor": "2 Coríntios", "Gál": "Gálatas", "Efé": "Efésios", "Fil": "Filipenses", "Col": "Colossenses", "1 Te": "1 Tessalonicenses", "1 Tes": "1 Tessalonicenses", "2 Te": "2 Tessalonicenses", "2 Tes": "2 Tessalonicenses", "1 Tim": "1 Timóteo", "2 Tim": "2 Timóteo", "Tit": "Tito", "Flm": "Filémon", "Filêmon": "Filémon", "Heb": "Hebreus", "Tia": "Tiago", "1 Ped": "1 Pedro", "2 Ped": "2 Pedro", "1 Jo": "1 João", "2 Jo": "2 João", "3 Jo": "3 João", "Ju": "Judas", "re": "Apocalipse", "Re": "Apocalipse", "apo": "Apocalipse", "Apo": "Apocalipse", "Revelação": "Apocalipse", "Revelacao": "Apocalipse", "Apocalipse": "Apocalipse"
    };
    // Garante que os valores também sejam chaves para evitar erros de busca
    Object.values(BIBLE_MAP).forEach(v => { BIBLE_MAP[v] = v; });

    let listaBlocos = [];

    // --- NOVA FUNÇÃO: Transforma "Primeiro Reis" em "1 Reis" (Suporta quebras de linha) ---
    function padronizarOrdinaisBiblicos(texto) {
        // Lista de livros que possuem numeração (ex: 1 Reis, 2 Reis)
        // O regex considera variações de acentuação para robustez
        const livrosAlvo = "Samuel|Reis|Cr[ôoó]nicas|Cor[íi]ntios|Tessalonicenses|Tim[óo]teo|Pedro|Jo[ãa]o";
        
        // Padrão para conectivos opcionais (ex: Primeiro "de" Reis, Segunda "a" Timóteo)
        // [\s\n]+ garante que funcione mesmo se houver quebra de linha
        const conectivos = "(?:[\\s\\n]+(?:de|da|do|dos|das|a|ao|aos|à|às))?";

        const substituicoes = [
            { 
                // Regex para 1º / Primeiro / Primeira
                regex: new RegExp(`\\b(Primeir[oa]s?|1[ºª])${conectivos}[\\s\\n]+(${livrosAlvo})\\b`, "gi"), 
                prefixo: "1" 
            },
            { 
                // Regex para 2º / Segundo / Segunda
                regex: new RegExp(`\\b(Segund[oa]s?|2[ºª])${conectivos}[\\s\\n]+(${livrosAlvo})\\b`, "gi"), 
                prefixo: "2" 
            },
            { 
                // Regex para 3º / Terceiro / Terceira
                regex: new RegExp(`\\b(Terceir[oa]s?|3[ºª])${conectivos}[\\s\\n]+(${livrosAlvo})\\b`, "gi"), 
                prefixo: "3" 
            }
        ];

        substituicoes.forEach(item => {
            texto = texto.replace(item.regex, (match, p1, p2) => {
                // Retorna "1 " + Nome do Livro (mantendo a capitalização original do livro encontrada em p2 ou ajustando se necessário)
                // Vamos forçar a primeira letra do livro para maiúscula para ficar bonito
                let livro = p2.charAt(0).toUpperCase() + p2.slice(1);
                return `${item.prefixo} ${livro}`;
            });
        });

        return texto;
    }

    function formatarReferenciasBiblicas(texto) {
        const livros = Object.keys(BIBLE_MAP).sort((a, b) => b.length - a.length);
        livros.forEach(abrev => {
            const abrevEscaped = abrev.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            // Regex ajustada: agora aceita números diretos (ex: 1 Reis 12:3) se estiverem formatados com : ou se tiverem a palavra capítulo
            // A lógica abaixo foca na estrutura "Livro + (capítulo X | X:Y)"
            const regex = new RegExp(`(${abrevEscaped})[\\s\\n]+(?:cap[íi]tulo[\\s\\n]+)?(\\d+)(?:[\\s\\n,.;:]*vers[íi]culo[s]?[\\s\\n]+(\\d+)|:(\\d+))?(?:[\\s\\n]*(?:e|a|at[ée]|-)[\\s\\n]+(\\d+))?`, "gi");
            
            texto = texto.replace(regex, (match, p1, p2, p3, p4, p5) => {
                const nomeLivro = BIBLE_MAP[p1] || p1;
                // p2 é o capítulo
                // p3 é versículo (se vier depois da palavra versículo)
                // p4 é versículo (se vier depois de :)
                // p5 é versículo final
                let versiculoInicial = p3 || p4;
                
                let ref = `${nomeLivro} ${p2}`;
                if (versiculoInicial) {
                    ref += `:${versiculoInicial}`;
                    if (p5) ref += `-${p5}`;
                }
                return ref;
            });
        });
        return texto;
    }

    function processarLegenda() {
        let t = document.getElementById('entrada').value;
        // Limpeza inicial
        t = t.replace(/^WEBVTT.*/gi, '').replace(/^\d{2}:\d{2}:\d{2}.\d{3}.*-->.*$/gm, '').replace(/<\/?[^>]+(>|$)/g, "").replace(/[™®]|â„¢/g, ''); 
        
        // Correção de Encoding
        const mapa = {'Ã‰': 'É', 'Ã¢': 'â', 'Ã\u00a0': 'à', 'Ã  ': 'à ', 'Ã ': 'à', 'â€œ': '“', 'â€\u009d': '”', 'â€': '”', 'â€˜': '‘', 'â€™': '’', 'Ã¡': 'á', 'Ã£': 'ã', 'Ã©': 'é', 'Ãª': 'ê', 'Ã­': 'í', 'Ã³': 'ó', 'Ã´': 'ô', 'Ãµ': 'õ', 'Ãº': 'ú', 'Ã§': 'ç', 'Ã¶': 'ö', 'Ã ': 'Á', 'Ã“': 'Ó', 'Ã‡': 'Ç', 'Ã€': 'À', 'Â·': '·', 'Â': ''};
        for (let erro in mapa) { t = t.split(erro).join(mapa[erro]); }

        // 1. Padronizar Ordinais (Primeiro Reis -> 1 Reis)
        t = padronizarOrdinaisBiblicos(t);
        
        // 2. Formatar Referências (1 Reis capítulo 12... -> 1 Reis 12...)
        t = formatarReferenciasBiblicas(t);

        const linhas = t.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        listaBlocos = linhas.map((texto, i) => ({ id: i, tipo: 'subtema', texto: texto }));

        document.getElementById('editorArea').style.display = 'block';
        renderizarBlocos();
    }

    function renderizarBlocos() {
        const container = document.getElementById('blocosContainer');
        container.innerHTML = '';
        const fragment = document.createDocumentFragment();
        listaBlocos.forEach((bloco, index) => {
            const div = document.createElement('div');
            div.id = `bloco-row-${index}`;
            div.className = `block-row type-${bloco.tipo}`;
            div.innerHTML = `<div class="num-tag">#${index + 1}</div>
                <select class="type-select" onchange="mudarTipo(${index}, this.value)">
                    <option value="subtema" ${bloco.tipo === 'subtema' ? 'selected' : ''}>Subtema</option>
                    <option value="discurso" ${bloco.tipo === 'discurso' ? 'selected' : ''}>Discurso</option>
                    <option value="video" ${bloco.tipo === 'video' ? 'selected' : ''}>Vídeo</option>
                    <option value="musical" ${bloco.tipo === 'musical' ? 'selected' : ''}>Vídeo Musical</option>
                </select>
                <div class="block-text" contenteditable="true" onblur="listaBlocos[${index}].texto = this.innerText">${bloco.texto}</div>`;
            fragment.appendChild(div);
        });
        container.appendChild(fragment);
    }

    function mudarTipo(index, novoTipo) {
        listaBlocos[index].tipo = novoTipo;
        const linhaRef = document.getElementById(`bloco-row-${index}`);
        if (linhaRef) { linhaRef.className = `block-row type-${novoTipo}`; }
    }

    function gerarJSON() {
        const vidId = document.getElementById('videoId').value;
        const ref = document.getElementById('videoRef').value;
        const context = document.getElementById('videoContext').value;
        const titulo = document.getElementById('videoTitle').value;
        
        if (!vidId || !ref || !titulo) { alert("Preencha o ID, Referência e o Título."); return; }

        let conteudoFinal = [];
        let ranges = [];
        let tiposCiclo = ['discurso', 'video', 'musical'];

        tiposCiclo.forEach(tipo => {
            let indices = [];
            listaBlocos.forEach((b, i) => { if(b.tipo === tipo) indices.push(i); });
            for(let k = 0; k < indices.length; k += 2) {
                if(indices[k+1] !== undefined) {
                    ranges.push({ start: indices[k], end: indices[k+1], tipo: tipo });
                }
            }
        });

        ranges.sort((a, b) => a.start - b.start);

        let counts = { subtema: 0, discurso: 0, video: 0, musical: 0 };
        let i = 0;

        while (i < listaBlocos.length) {
            let rangeAtiva = ranges.find(r => r.start === i);

            if (rangeAtiva) {
                let textoAgrupado = [];
                for (let j = rangeAtiva.start; j <= rangeAtiva.end; j++) {
                    textoAgrupado.push(listaBlocos[j].texto);
                }
                counts[rangeAtiva.tipo]++;
                conteudoFinal.push({
                    "tipo": rangeAtiva.tipo,
                    "texto": textoAgrupado.join(' ').replace(/\s+/g, ' ').trim(),
                    "pagina": null,
                    "numero_ref": String(counts[rangeAtiva.tipo])
                });
                i = rangeAtiva.end + 1;
            } else {
                let gapTexto = [];
                let j = i;
                while (j < listaBlocos.length && !ranges.some(r => r.start === j)) {
                    gapTexto.push(listaBlocos[j].texto);
                    j++;
                }
                if (gapTexto.length > 0) {
                    counts.subtema++;
                    conteudoFinal.push({
                        "tipo": "subtema",
                        "texto": gapTexto.join(' ').replace(/\s+/g, ' ').trim(),
                        "pagina": null,
                        "numero_ref": String(counts.subtema)
                    });
                }
                i = j;
            }
        }

        const finalJson = { 
            "video": { 
                "id": vidId,
                "referencia": ref, 
                "contexto": context,
                "titulo": titulo, 
                "conteudo": conteudoFinal 
            } 
        };
        
        navigator.clipboard.writeText(JSON.stringify(finalJson, null, 4)).then(() => alert("✅ JSON Gerado com Contexto!"));
    }
</script>
</body>
</html>
