    <style>
        :root {
            --bg-color: #1a1a1d;
            --panel-color: #252528;
            --accent-color: #f39c12;
            --text-color: #f0f0f0;
            --border-color: #444;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
        }

        body {
            font-family: monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            gap: 20px;
            height: 100vh;
            box-sizing: border-box;
        }

        .column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            min-width: 350px;
        }

        h1 { color: var(--accent-color); font-size: 1.1rem; margin: 0 0 10px 0; border-bottom: 1px solid #444; padding-bottom: 5px; }
        
        .card {
            background: var(--panel-color);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        textarea, button {
            width: 100%;
            box-sizing: border-box;
            background: #111;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            margin-top: 5px;
            border-radius: 4px;
            font-family: monospace;
        }

        button {
            background: var(--accent-color);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border: none;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; background: #555; }

        .btn-group { display: flex; gap: 5px; margin-bottom: 10px; }
        .btn-small { width: auto; padding: 5px 10px; font-size: 0.8rem; margin-top:0; flex: 1;}

        /* Grid de Seleção de Livros */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 2px;
            flex: 1;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 5px;
            background: #111;
            max-height: 400px; /* Limite de altura para scroll */
        }
        
        .book-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            padding: 2px;
        }
        .book-item:hover { background-color: #333; }
        .book-item input { margin: 0; width: auto; cursor: pointer; }
        .book-item label { cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .log-entry { margin-bottom: 2px; font-size: 0.75rem; border-bottom: 1px solid #333; padding: 2px 0;}
        .log-success { color: var(--success-color); }
        .log-error { color: var(--error-color); }
        .log-info { color: #3498db; }

        #progressBar {
            width: 100%; height: 6px; background: #333; margin-top: 10px; border-radius: 3px; overflow: hidden; display: none;
        }
        #progressFill { height: 100%; background: var(--accent-color); width: 0%; transition: width 0.2s; }
    </style>

     // 1. Inicializar Checkboxes
window.onload = function() {
    const container = document.getElementById('bookSelectionContainer');
    container.innerHTML = "";
    BIBLE_DATA.forEach(book => {
        const div = document.createElement('div');
        div.className = 'book-item';
        div.innerHTML = `<input type="checkbox" value="${book.nome}" id="chk_${book.id}" data-id="${book.id}">
                         <label for="chk_${book.id}">${book.nome}</label>`;
        container.appendChild(div);
    });
};

function toggleAll(state) {
    document.querySelectorAll('#bookSelectionContainer input').forEach(cb => cb.checked = state);
}

function toggleSection(section) {
    document.querySelectorAll('#bookSelectionContainer input').forEach(cb => {
        const id = parseInt(cb.dataset.id);
        cb.checked = (section === 'AT') ? (id <= 39) : (id >= 40);
    });
}

function slugify(text) {
    return text.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, "_");
}

function normalizeFileName(name) {
    return name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, "-") + ".json";
}

// 2. FUNÇÃO PRINCIPAL DE EXTRAÇÃO
async function connectAndFetch() {
    const configStr = document.getElementById('firebaseConfig').value;
    const btn = document.getElementById('btnFetch');
    const status = document.getElementById('statusText');
    const reportDiv = document.getElementById('validationReport');
    const checkboxes = document.querySelectorAll('#bookSelectionContainer input:checked');
    const selectedBookNames = Array.from(checkboxes).map(cb => cb.value);

    if (selectedBookNames.length === 0) return alert("Selecione um livro!");

    try {
        const config = eval(`(${configStr.replace(/const firebaseConfig = /, '').replace(/;$/, '')})`);
        if (!firebase.apps.length) firebase.initializeApp(config);
        const db = firebase.firestore();

        btn.disabled = true;
        document.getElementById('progressBar').style.display = 'block';
        reportDiv.innerHTML = "";
        extractedData = {};
        let totalVersesFound = 0;

        for (let i = 0; i < selectedBookNames.length; i++) {
            const bookName = selectedBookNames[i];
            const bookSlug = slugify(bookName);
            status.innerText = `Extraindo: ${bookName}...`;

            const snapshot = await db.collection("bible_verses_public")
                .where(firebase.firestore.FieldPath.documentId(), '>=', bookSlug + '_')
                .where(firebase.firestore.FieldPath.documentId(), '<', bookSlug + '_\uf8ff')
                .get();

            if (snapshot.empty) {
                reportDiv.innerHTML += `<div class='log-entry log-error'>❌ ${bookName}: Vazio</div>`;
            } else {
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const match = data.nome.match(/^(.*)\s+(\d+):(\d+)$/);
                    if (match) {
                        const b = match[1].trim(), c = parseInt(match[2]), v = parseInt(match[3]);
                        if (!extractedData[b]) extractedData[b] = {};
                        if (!extractedData[b][c]) extractedData[b][c] = {};
                        extractedData[b][c][v] = data.texto;
                        totalVersesFound++;
                    }
                });
                reportDiv.innerHTML += `<div class='log-entry log-info'>📥 ${bookName}: ${snapshot.size} versículos</div>`;
            }
            document.getElementById('progressFill').style.width = ((i + 1) / selectedBookNames.length * 100) + "%";
        }

        status.innerText = `Fim! ${totalVersesFound} versículos.`;
        btn.disabled = false;
        generateDownloadButtons();
        validateData(selectedBookNames);

    } catch (e) {
        alert("Erro: " + e.message);
        btn.disabled = false;
    }
}

// 3. GERAÇÃO DE BOTÕES E DOWNLOAD
function generateDownloadButtons() {
    const area = document.getElementById('downloadButtonsArea');
    area.innerHTML = "";
    Object.keys(extractedData).forEach(bookName => {
        const fileName = normalizeFileName(bookName);
        const singleBookData = JSON.stringify({ [bookName]: extractedData[bookName] }, null, 2);
        
        const btn = document.createElement('button');
        btn.innerText = `💾 ${fileName}`;
        btn.className = 'btn-small';
        btn.style.background = '#2ecc71';
        btn.onclick = () => {
            const blob = new Blob([singleBookData], {type: "application/json"});
            const a = document.createElement("a");
            a.download = fileName;
            a.href = window.URL.createObjectURL(blob);
            a.click();
        };
        area.appendChild(btn);
    });
}

    reportDiv.innerHTML += "<br><b>--- Validação ---</b>";
    let errors = 0;

    BIBLE_DATA.filter(b => selectedNames.includes(b.nome)).forEach(meta => {
        const foundKey = Object.keys(extractedData).find(k => slugify(k) === slugify(meta.nome));
        if (!foundKey) return;

        for (let c = 1; c <= meta.caps; c++) {
            const expected = meta.versiculos[c-1];
            const current = extractedData[foundKey][c] ? Object.keys(extractedData[foundKey][c]).length : 0;
            if (current !== expected) {
                reportDiv.innerHTML += `<div class='log-entry log-error'>⚠️ ${meta.nome} ${c}: ${current}/${expected}</div>`;
                errors++;
            }
        }
    });
    if(errors === 0) reportDiv.innerHTML += `<div class='log-success'>🎉 Tudo certo!</div>`;
}


    </script>
</body>
</html>
