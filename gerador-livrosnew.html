<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Pro JW (V36 - Adição de Introdução)</title>
    <style>
        :root { --primary: #3498db; --success: #27ae60; --dark: #2c3e50; --bg: #f4f4f9; --pergunta: #e67e22; --danger: #e74c3c; --section: #9b59b6; --intro: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; background: var(--bg); overflow: hidden; }
        .tabs-bar { display: flex; flex-wrap: wrap; background: #ddd; padding: 5px; gap: 4px; border-bottom: 2px solid #bbb; overflow-y: auto; max-height: 120px; align-items: center; }
        
        .tab { padding: 5px 8px; background: #eee; border: 1px solid #aaa; cursor: pointer; font-weight: bold; font-size: 0.7em; border-radius: 4px; min-width: 25px; text-align: center; transition: 0.2s;}
        .tab.active { background: var(--primary); color: white; border-color: var(--dark); }
        .tab.has-text { border-bottom: 3px solid #f1c40f; } 
        .tab.has-blocks { border-bottom: 3px solid var(--success); }
        
        /* Estilos Secções, Intro e Botões +S e +I */
        .tab-section { background: var(--section); color: white; border-color: #8e44ad; }
        .tab-section.active { background: #8e44ad; border-color: var(--dark); box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        
        .tab-intro { background: var(--intro); color: white; border-color: #d35400; }
        .tab-intro.active { background: #d35400; border-color: var(--dark); box-shadow: 0 0 5px rgba(0,0,0,0.5); }

        .tab-add-s { background: var(--success); color: white; border-color: #219653; font-size: 0.8em; padding: 5px 10px; border-radius: 20px;}
        .tab-add-s:hover { background: #219653; transform: scale(1.05); }

        .tab-add-i { background: #f39c12; color: white; border-color: #e67e22; font-size: 0.8em; padding: 5px 10px; border-radius: 20px;}
        .tab-add-i:hover { background: #e67e22; transform: scale(1.05); }

        .panel { flex: 1; padding: 15px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .left { border-right: 2px solid #ddd; max-width: 42%; background: white; }
        .right { background: #f8f9fa; }
        
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h2 { margin: 0; font-size: 1.1em; color: var(--dark); }
        .mode-select { padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc; font-weight: bold; font-size: 0.85em; background: white; color: var(--dark); cursor: pointer; }

        label { font-size: 0.7em; font-weight: bold; color: #666; margin-top: 8px; display: block; }
        input, textarea, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        textarea { flex: 1; min-height: 150px; resize: none; font-family: monospace; font-size: 0.85em; }
        
        #validator { position: absolute; top: 15px; right: 15px; padding: 8px 12px; border-radius: 8px; font-size: 0.75em; font-weight: bold; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .val-ok { background: var(--success); color: white; }
        .val-warn { background: var(--danger); color: white; }

        .block-item { background: white; border: 1px solid #e0e0e0; border-radius: 6px; padding: 8px; margin-bottom: 6px; display: flex; gap: 10px; align-items: flex-start; }
        .type-pergunta { border-left: 5px solid var(--pergunta); } .type-paragrafo { border-left: 5px solid var(--primary); }
        .type-subtema { border-left: 5px solid var(--dark); background: #f0f4f8; } 
        .type-rodape { border-left: 5px solid #95a5a6; color: #666; font-style: italic; background: #fdfdfd; }
        
        .page-wrapper { display: flex; flex-direction: column; align-items: center; width: 45px; flex-shrink: 0; }
        .page-wrapper .badge { font-size: 0.6em; font-weight: bold; color: #888; margin-bottom: 2px; }
        .page-input { width: 100%; text-align: center; font-weight: bold; border: 2px solid #ddd; padding: 3px; font-size: 0.8em; }
        .page-input.manual { border-color: var(--success); background: #eafaf1; }
        .content-text { flex: 1; font-size: 0.85em; line-height: 1.4; white-space: pre-wrap; }
        
        .type-select { font-size: 0.65em; font-weight: 900; text-transform: uppercase; margin-right: 5px; padding: 2px 4px; border-radius: 4px; border: 1px solid #ccc; cursor: pointer; outline: none; }
        .type-select:hover { border-color: #888; }
        .type-badge-paragrafo { background: #e3f2fd; color: #1565c0; border-color: #90caf9; }
        .type-badge-pergunta { background: #fff3e0; color: #e65100; border-color: #ffcc80; }
        .type-badge-subtema { background: #f3e5f5; color: #6a1b9a; border-color: #ce93d8; }
        .type-badge-rodape { background: #f5f5f5; color: #616161; border-color: #e0e0e0; }

        .num-tag { background: #333; color: white; padding: 1px 5px; border-radius: 4px; font-size: 0.75em; margin-right: 5px; font-weight: bold; }
        .num-tag-sub { background: #8e44ad; color: white; padding: 1px 5px; border-radius: 4px; font-size: 0.75em; margin-right: 5px; font-weight: bold; }
        .num-tag-auto { background: var(--primary); color: white; padding: 1px 5px; border-radius: 4px; font-size: 0.75em; margin-right: 5px; font-weight: bold; border: 1px dashed white; }
        
        .btn-generate { background: var(--success); height: 50px; font-size: 1.1em; color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }
        #jsonOutput { background: #222; color: #0f0; height: 100px; margin-top: 10px; }

        /* Estilos do Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 20px; border-radius: 8px; width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .modal-box h3 { margin-top: 0; color: var(--dark); }
        .modal-btns { display: flex; justify-content: space-between; gap: 10px; margin-top: 20px; }
        .modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; color: white; }
        .btn-cancel { background: #95a5a6; } .btn-confirm { background: var(--primary); }
    </style>
</head>
<body>

<!-- Modal de Criação de Secção -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <h3>Adicionar Nova Secção</h3>
        <label>Onde deseja colocar a Secção?</label>
        <select id="secPosition"></select>
        
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
            <button class="btn-confirm" onclick="confirmAddSection()">Criar Secção</button>
        </div>
    </div>
</div>

<div class="panel left">
    <div class="tabs-bar" id="tabsBar"></div>
    <div style="flex:1; display:flex; flex-direction:column; padding-top:10px;">
        
        <div class="header-row">
            <h2 id="editorTitle">Capítulo</h2>
            <select id="modeSelect" class="mode-select" onchange="changeMode()">
                <option value="antigo">Antigo</option>
                <option value="moderno">Moderno</option>
            </select>
        </div>
        
        <div style="display:flex; gap:10px">
            <div style="flex:1" id="capNumContainer"><label>Nº Cap.</label><input type="number" id="chapNum" oninput="liveUpdate()"></div>
            <div style="flex:3"><label id="titleLabel">Título</label><input type="text" id="itemTitle" oninput="liveUpdate()"></div>
        </div>
        <label>Conteúdo (Opcional para secções)</label>
        <textarea id="rawInput" oninput="liveUpdate()" placeholder="Cole o texto aqui..."></textarea>
        <label>Saída JSON:</label>
        <textarea id="jsonOutput" readonly></textarea>
    </div>
</div>

<div class="panel right">
    <div id="validator" class="val-ok">✅ Sincronizado</div>
    <h2>Pré-visualização</h2>
    <div id="previewContainer" style="flex:1; overflow-y:auto; border: 1px solid #ddd; padding: 10px; background: #fff;"></div>
    <button class="btn-generate" onclick="finalizeAll()">🏁 Gerar e Copiar Tudo (JSON)</button>
</div>

<script>
    const TOTAL_CAPS = 70;
    let items = Array.from({ length: TOTAL_CAPS }, (_, i) => ({ type: 'chapter', num: i + 1, title: "", raw: "", blocks: [], mode: 'antigo' }));
    let currentIdx = 0;
    let sectionCounter = 1;

    function initTabs() {
        const bar = document.getElementById('tabsBar'); 
        bar.innerHTML = '';
        
        items.forEach((item, i) => {
            const btn = document.createElement('div');
            const hasText = item.raw && item.raw.trim().length > 0;
            const hasBlocks = item.blocks && item.blocks.length > 0;
            
            let classes = `tab ${i === currentIdx ? 'active' : ''} ${hasText ? 'has-text' : ''} ${hasBlocks ? 'has-blocks' : ''}`;
            
            if(item.type === 'section') {
                classes += ' tab-section';
                btn.textContent = 'S' + item.s_id;
                btn.title = item.title || "Nova Secção";
            } else if (item.type === 'introduction') {
                classes += ' tab-intro';
                btn.textContent = 'I';
                btn.title = item.title || "Introdução";
            } else {
                btn.textContent = item.num;
                btn.title = `Capítulo ${item.num}`;
            }
            
            btn.className = classes;
            btn.onclick = () => switchTab(i); 
            bar.appendChild(btn);
        });

        // Botão +I
        const btnI = document.createElement('div');
        btnI.className = 'tab tab-add-i';
        btnI.textContent = '+I';
        btnI.title = "Adicionar Introdução";
        btnI.onclick = addIntroduction;
        bar.appendChild(btnI);

        // Botão +S
        const btnS = document.createElement('div');
        btnS.className = 'tab tab-add-s';
        btnS.textContent = '+S';
        btnS.title = "Adicionar Secção Intercalada";
        btnS.onclick = openModal;
        bar.appendChild(btnS);
    }

    function addIntroduction() {
        // Verifica se já existe uma introdução
        let introIdx = items.findIndex(i => i.type === 'introduction');
        if (introIdx !== -1) {
            switchTab(introIdx); // Vai para ela se já existir
            return;
        }

        // Caso contrário, procura o index do Capítulo 1
        let cap1Idx = items.findIndex(i => i.type === 'chapter' && i.num == 1);
        let insertIndex = cap1Idx !== -1 ? cap1Idx : 0;

        items.splice(insertIndex, 0, { type: 'introduction', title: "", raw: "", blocks: [], mode: 'antigo' });
        switchTab(insertIndex);
    }

    function openModal() {
        const sel = document.getElementById('secPosition');
        sel.innerHTML = '';
        const caps = items.filter(i => i.type === 'chapter');
        
        if(caps.length > 0) {
            sel.add(new Option(`Antes do Cap. ${caps[0].num}`, `before_${caps[0].num}`));
            for(let i=0; i<caps.length-1; i++) {
                sel.add(new Option(`Entre Cap. ${caps[i].num} e ${caps[i+1].num}`, `before_${caps[i+1].num}`)); 
            }
            sel.add(new Option(`Depois do Cap. ${caps[caps.length-1].num}`, `after_${caps[caps.length-1].num}`));
        } else {
            sel.add(new Option(`Final da lista`, `end`));
        }
        
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

    function confirmAddSection() {
        const val = document.getElementById('secPosition').value;
        let insertIndex = items.length;
        
        if(val.startsWith('before_')) {
            const num = parseInt(val.split('_')[1]);
            insertIndex = items.findIndex(i => i.type === 'chapter' && i.num === num);
        } else if(val.startsWith('after_')) {
            const num = parseInt(val.split('_')[1]);
            let baseIdx = items.findIndex(i => i.type === 'chapter' && i.num === num);
            insertIndex = baseIdx + 1;
            while(insertIndex < items.length && items[insertIndex].type !== 'chapter') { insertIndex++; }
        }
        
        items.splice(insertIndex, 0, { type: 'section', s_id: sectionCounter++, title: "", raw: "", blocks: [], mode: 'antigo' });
        closeModal();
        switchTab(insertIndex);
    }

    function changeMode() {
        items[currentIdx].mode = document.getElementById('modeSelect').value;
        liveUpdate();
    }

    function liveUpdate() {
        const item = items[currentIdx];
        if (item.type === 'chapter') {
            item.num = document.getElementById('chapNum').value;
            document.getElementById('editorTitle').textContent = `Capítulo ${item.num}`;
        } else if (item.type === 'introduction') {
            document.getElementById('editorTitle').textContent = `Introdução`;
        } else {
            document.getElementById('editorTitle').textContent = `Secção S${item.s_id}`;
        }
        item.title = document.getElementById('itemTitle').value;
        item.raw = document.getElementById('rawInput').value;
        
        if (item.raw.trim() !== "") { autoProcess(currentIdx); renderPreview(); }
        else { item.blocks = []; renderPreview(); validateIntegrity(); }
        initTabs();
    }

    function switchTab(newIdx) {
        currentIdx = newIdx;
        const item = items[currentIdx];
        
        if (item.type === 'section') {
            document.getElementById('capNumContainer').style.display = 'none';
            document.getElementById('titleLabel').textContent = `Título da Secção (S${item.s_id})`;
            document.getElementById('editorTitle').textContent = `Secção S${item.s_id}`;
        } else if (item.type === 'introduction') {
            document.getElementById('capNumContainer').style.display = 'none';
            document.getElementById('titleLabel').textContent = `Título da Introdução`;
            document.getElementById('editorTitle').textContent = `Introdução`;
        } else {
            document.getElementById('capNumContainer').style.display = 'block';
            document.getElementById('chapNum').value = item.num;
            document.getElementById('titleLabel').textContent = `Título do Capítulo`;
            document.getElementById('editorTitle').textContent = `Capítulo ${item.num}`;
        }
        
        document.getElementById('itemTitle').value = item.title;
        document.getElementById('rawInput').value = item.raw;
        document.getElementById('modeSelect').value = item.mode || 'antigo';
        
        initTabs(); renderPreview(); validateIntegrity();
    }

    function expandRange(str) {
        if (!str) return [];
        const match = str.match(/(\d+)\s*[-–,]\s*(\d+)/);
        if (match) {
            let start = parseInt(match[1]), end = parseInt(match[2]);
            return Array.from({length: end - start + 1}, (_, i) => start + i);
        }
        return str.match(/\d+/g)?.map(Number) || [];
    }

    function changeBlockType(blockIndex, newType) {
        items[currentIdx].blocks[blockIndex].manualType = newType;
        autoProcess(currentIdx); 
        renderPreview();         
    }

    function autoProcess(idx) {
        const raw = items[idx].raw;
        const mode = items[idx].mode || 'antigo';
        const oldBlocks = items[idx].blocks || [];
        let tempBlocks = [];
        let isFootnote = false;
        let isInsideBox = false;
        let pendingParaNums = [];
        let nextParaNum = 1;
        let subthemeCounter = 0;
        let paraOneFound = false;

        const lines = raw.split(/\n+/).filter(l => {
            const cleanLine = l.trim().toLowerCase();
            return cleanLine !== "" && cleanLine !== "a sua resposta" && cleanLine !== "sua resposta";
        });

        lines.forEach((line, lineIdx) => {
            let txt = line.trim();
            
            let manualType = (oldBlocks[lineIdx] && oldBlocks[lineIdx].rawText === txt) ? oldBlocks[lineIdx].manualType : null;
            let manualPage = (oldBlocks[lineIdx] && oldBlocks[lineIdx].rawText === txt) ? oldBlocks[lineIdx].manualPage : null;

            if (!isFootnote && txt.startsWith('[')) { isFootnote = true; }

            const qMatch = txt.match(/^(\d+[\d\s\.,\-\(a-z\)]*?\.)\s+(.*)/);
            const pMatch = txt.match(/^(\d+)\s+(.*)/);
            const noteMatch = txt.match(/^(\d+)[\.\)]\s+(.*)/);

            let type = '';

            if (isFootnote) {
                type = 'rodape';
            } 
            else if (mode === 'antigo') {
                const lastChar = txt.slice(-1);
                const hasNoPunctuation = /[a-zA-Z0-9À-ÿ]/.test(lastChar);
                const isQuestionOrExclam = lastChar === '?' || lastChar === '!';
                const isSimplePhrase = !txt.includes('. ') && txt.length < 200;

                if ((hasNoPunctuation || isQuestionOrExclam) && isSimplePhrase) {
                    type = 'subtema';
                } else {
                    type = 'paragrafo';
                }
            } 
            else {
                const boxHeaders = ["PRINCÍPIOS DA BÍBLIA", "RESUMO", "COMO RESPONDERIA?", "QUADRO", "ENTENDA MELHOR", "EXPERIMENTOU?", "LIÇÕES QUE APRENDEMOS"];
                const isBoxStart = boxHeaders.some(h => txt.toUpperCase() === h || (txt.length < 35 && txt.toUpperCase().startsWith(h)));
                if (!isFootnote && isBoxStart) { isInsideBox = true; }

                const isAllCaps = txt === txt.toUpperCase() && txt.length > 4 && !/^\d+/.test(txt) && !txt.startsWith('“') && !txt.startsWith('[');

                if (qMatch) {
                    type = 'pergunta';
                } else if (pMatch) {
                    type = 'paragrafo';
                } else if (isAllCaps || isInsideBox || !paraOneFound) {
                    if (!paraOneFound && pendingParaNums.length > 0) {
                        type = 'paragrafo';
                    } else {
                        type = 'subtema';
                    }
                } else {
                    type = 'paragrafo';
                }
            }

            if (manualType) { type = manualType; }

            let cleanText = txt;
            let numberRef = null;
            let isInferred = false;

            if (type === 'rodape') {
                if (noteMatch) { numberRef = noteMatch[1]; cleanText = noteMatch[2]; }
            } 
            else if (type === 'subtema') {
                subthemeCounter++;
                numberRef = subthemeCounter.toString();
                if (pMatch) cleanText = pMatch[2];
                else if (qMatch) cleanText = qMatch[2];
            } 
            else if (type === 'pergunta') {
                if (qMatch) {
                    numberRef = qMatch[1].replace(/\.$/, '');
                    cleanText = qMatch[2];
                    pendingParaNums = expandRange(numberRef);
                } else {
                    const fallbackMatch = txt.match(/^(\d+)[\.\)]?\s+(.*)/);
                    if (fallbackMatch) {
                        numberRef = fallbackMatch[1];
                        cleanText = fallbackMatch[2];
                        pendingParaNums = expandRange(numberRef);
                    }
                }
            } 
            else if (type === 'paragrafo') {
                if (pMatch) {
                    numberRef = pMatch[1];
                    cleanText = pMatch[2];
                    if (parseInt(numberRef) === 1) paraOneFound = true;
                    nextParaNum = parseInt(numberRef) + 1;
                    pendingParaNums = pendingParaNums.filter(n => n !== parseInt(numberRef));
                } else {
                    if (pendingParaNums.length > 0) {
                        numberRef = pendingParaNums.shift().toString();
                        isInferred = true;
                        if (parseInt(numberRef) === 1) paraOneFound = true;
                    } else {
                        numberRef = nextParaNum.toString();
                        isInferred = true;
                        nextParaNum++;
                    }
                    if (qMatch) cleanText = qMatch[2];
                }
            }

            tempBlocks.push({ 
                type: type, 
                text: cleanText, 
                number: numberRef, 
                inferred: isInferred, 
                rawText: txt, 
                manualType: manualType,
                manualPage: manualPage
            });
        });
        
        items[idx].blocks = tempBlocks;
        validateIntegrity();
    }

    function validateIntegrity() {
        const item = items[currentIdx];
        const blocks = item.blocks;
        const valDiv = document.getElementById('validator');
        
        if (item.type === 'section') {
            valDiv.className = 'val-ok'; valDiv.innerHTML = '✅ Secção O.K.'; return;
        }
        if (item.type === 'introduction') {
            valDiv.className = 'val-ok'; valDiv.innerHTML = '✅ Introdução O.K.'; return;
        }
        if (item.mode === 'antigo') {
            valDiv.className = 'val-ok'; valDiv.innerHTML = '✅ Sincronizado (Antigo)'; return;
        }

        let qCoverage = new Set();
        let pExists = new Set();
        blocks.forEach(b => {
            if (b.type === 'pergunta') expandRange(b.number).forEach(n => qCoverage.add(n));
            if (b.type === 'paragrafo') pExists.add(parseInt(b.number));
        });
        let missQ = [...pExists].filter(n => !qCoverage.has(n));
        let missP = [...qCoverage].filter(n => !pExists.has(n));
        
        if (missQ.length === 0 && missP.length === 0) {
            valDiv.className = 'val-ok'; valDiv.innerHTML = '✅ Sincronizado';
        } else {
            valDiv.className = 'val-warn';
            valDiv.innerHTML = `⚠️ ${missQ.length>0?'Párs s/ pergunta: '+missQ.join(','):''} ${missP.length>0?'Refs inexistentes: '+missP.join(','):''}`;
        }
    }

    function renderPreview() {
        const container = document.getElementById('previewContainer'); container.innerHTML = '';
        const blocks = items[currentIdx].blocks;
        if (blocks.length === 0) return;
        
        blocks.forEach((block, index) => {
            const div = document.createElement('div');
            div.className = `block-item type-${block.type}`;
            
            let numTag = block.number ? `<span class="${block.type==='subtema'?'num-tag-sub':(block.inferred?'num-tag-auto':'num-tag')}">${block.type==='subtema'?'ST':''}${block.number}</span>` : '';
            
            const isP = block.type === 'paragrafo' ? 'selected' : '';
            const isQ = block.type === 'pergunta' ? 'selected' : '';
            const isS = block.type === 'subtema' ? 'selected' : '';
            const isR = block.type === 'rodape' ? 'selected' : '';

            div.innerHTML = `
                <div class="page-wrapper">
                    <span class="badge">PÁG</span>
                    <input type="text" class="page-input" id="p-${index}" value="${block.manualPage || ''}" oninput="items[currentIdx].blocks[${index}].manualPage = this.value; updateCascading();">
                </div>
                <div class="content-text">
                    <select class="type-select type-badge-${block.type}" onchange="changeBlockType(${index}, this.value)">
                        <option value="paragrafo" ${isP}>PARÁGRAFO</option>
                        <option value="pergunta" ${isQ}>PERGUNTA</option>
                        <option value="subtema" ${isS}>SUBTEMA</option>
                        <option value="rodape" ${isR}>RODAPÉ</option>
                    </select>
                    ${numTag} ${block.text}
                </div>`;
            container.appendChild(div);
        });
        updateCascading();
    }

    function updateCascading() {
        let last = "";
        items[currentIdx].blocks.forEach((_, i) => {
            const input = document.getElementById(`p-${i}`); if (!input) return;
            if (input.value.trim() !== "") { last = input.value.trim(); input.classList.add('manual'); }
            else { input.classList.remove('manual'); input.placeholder = last || "⬇"; }
        });
    }

    function finalizeAll() {
        const finalExport = items.filter(item => item.raw.trim() !== "" || item.title.trim() !== "").map(item => {
            let currentPg = null;
            const conteudo = item.blocks.map(b => {
                if (b.manualPage) currentPg = parseInt(b.manualPage);
                return { tipo: b.type, texto: b.text, pagina: currentPg, numero_ref: b.number };
            });
            
            if(item.type === 'section') {
                return {
                    tipo_item: "seccao",
                    id_seccao: "S" + item.s_id,
                    titulo: item.title,
                    conteudo: conteudo
                };
            } else if(item.type === 'introduction') {
                return {
                    tipo_item: "introducao",
                    titulo: item.title,
                    conteudo: conteudo
                };
            } else {
                return {
                    tipo_item: "capitulo",
                    capitulo: parseInt(item.num),
                    titulo: item.title,
                    formato: item.mode,
                    conteudo: conteudo
                };
            }
        });
        
        const jsonStr = JSON.stringify(finalExport, null, 4);
        document.getElementById('jsonOutput').value = jsonStr;
        navigator.clipboard.writeText(jsonStr).then(() => alert("Gerado e Copiado com sucesso!"));
    }
    
    switchTab(0);
</script>
</body>
</html>
