<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Manual MWB (V2.2)</title>
    <style>
        :root {
            --bg-color: #1a1a1d;
            --panel-bg: #252528;
            --text-color: #ffffff;
            --accent-color: #3498db;
            --border-color: #333;
            --success-color: #2ecc71;
            --tab-inactive: #333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .tabs-bar {
            display: flex;
            background: #111;
            padding: 10px 10px 0 10px;
            gap: 5px;
            border-bottom: 2px solid var(--border-color);
            overflow-x: auto;
        }
        .tab {
            padding: 8px 15px;
            background: var(--tab-inactive);
            color: #888;
            cursor: pointer;
            border-radius: 6px 6px 0 0;
            font-weight: bold;
            font-size: 0.8rem;
            transition: 0.2s;
            white-space: nowrap;
            border: 1px solid transparent;
        }
        .tab.active { background: var(--accent-color); color: white; }
        .tab.has-content { border-top: 3px solid var(--success-color); color: #ccc; }

        h1 { font-size: 1rem; padding: 10px 20px; background: #111; color: var(--accent-color); text-transform: uppercase; }

        .layout { display: flex; flex: 1; overflow: hidden; }

        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
            overflow: hidden;
            border-right: 1px solid var(--border-color);
        }

        textarea {
            flex: 1;
            background: #111;
            border: 1px solid var(--border-color);
            color: #ddd;
            padding: 15px;
            border-radius: 6px;
            resize: none;
            font-size: 0.9rem;
            line-height: 1.5;
            font-family: 'Consolas', monospace;
        }

        .controls {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
            padding: 15px;
            background: var(--panel-bg);
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        input, select {
            background: #111;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            border-radius: 4px;
            width: 100%;
        }

        label { font-size: 0.7rem; color: #888; display: block; margin-bottom: 4px; font-weight: bold; text-transform: uppercase; }

        button { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .btn-success { background: var(--success-color); color: white; width: 100%; }

        #preview-area {
            flex: 1;
            overflow-y: auto;
            background: #0d0d0f;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 20px;
        }

        .block-subtema { color: var(--accent-color); font-weight: bold; margin-top: 15px; margin-bottom: 8px; font-size: 1em; border-bottom: 1px solid #333; padding-bottom: 3px; }
        .block-paragrafo { color: #ccc; margin-bottom: 8px; font-size: 0.85em; line-height: 1.4; display: flex; align-items: flex-start; }
        .block-rodape { font-style: italic; color: #777; margin-top: 15px; border-top: 1px dashed #444; padding-top: 8px; font-size: 0.8em; }
        .ref-num { background: #333; color: #fff; font-size: 0.7em; padding: 1px 4px; border-radius: 3px; margin-right: 8px; flex-shrink: 0; margin-top: 2px; }

        .final-panel { background: #111; padding: 15px; display: flex; flex-direction: column; gap: 10px; min-width: 320px; }
    </style>
</head>
<body>

    <h1>Gerador Manual MWB - NotaBook</h1>

    <div class="tabs-bar" id="tabsBar"></div>

    <div class="layout">
        <div class="col">
            <div class="controls">
                <div>
                    <label>Referência (Ex: mwb26 pp. 2-16)</label>
                    <input type="text" id="inp-ref-base" placeholder="Cole a referência base aqui...">
                </div>
                <div>
                    <label>Mês</label>
                    <select id="inp-mes" onchange="handleMonthChange()">
                        <option value="janeiro">Janeiro</option>
                        <option value="fevereiro">Fevereiro</option>
                        <option value="março">Março</option>
                        <option value="abril">Abril</option>
                        <option value="maio">Maio</option>
                        <option value="junho">Junho</option>
                        <option value="julho">Julho</option>
                        <option value="agosto">Agosto</option>
                        <option value="setembro">Setembro</option>
                        <option value="outubro">Outubro</option>
                        <option value="novembro">Novembro</option>
                        <option value="dezembro">Dezembro</option>
                    </select>
                </div>
            </div>

            <textarea id="raw-input" placeholder="Cole aqui o texto da semana do Manual..."></textarea>
        </div>

        <div class="col">
            <label>Pré-visualização:</label>
            <div id="preview-area"></div>
        </div>

        <div class="final-panel">
            <label>Exportar Mês Completo</label>
            <button class="btn-success" onclick="finalizeAll()">🏁 Copiar JSON Consolidado</button>
            <div style="flex:1; display: flex; flex-direction: column; margin-top: 10px;">
                <label>JSON da Semana:</label>
                <textarea id="json-output" readonly style="font-size: 0.7rem; color: #a8d1ff;"></textarea>
            </div>
        </div>
    </div>

<script>
    let weeks = Array.from({ length: 10 }, () => ({
        refBase: "",
        mes: "janeiro",
        raw: "",
        processed: null
    }));

    let currentIdx = 0;

    function initTabs() {
        const bar = document.getElementById('tabsBar');
        bar.innerHTML = '';
        weeks.forEach((w, i) => {
            const btn = document.createElement('div');
            const hasContent = w.raw.trim().length > 0;
            btn.className = `tab ${i === currentIdx ? 'active' : ''} ${hasContent ? 'has-content' : ''}`;
            btn.textContent = `SEMANA ${i + 1}`;
            btn.onclick = () => switchTab(i);
            bar.appendChild(btn);
        });
    }

    function switchTab(newIdx) {
        saveCurrentData();
        currentIdx = newIdx;
        const data = weeks[currentIdx];
        document.getElementById('inp-ref-base').value = data.refBase;
        document.getElementById('inp-mes').value = data.mes;
        document.getElementById('raw-input').value = data.raw;
        initTabs();
        autoProcess();
    }

    function saveCurrentData() {
        weeks[currentIdx].refBase = document.getElementById('inp-ref-base').value;
        weeks[currentIdx].mes = document.getElementById('inp-mes').value;
        weeks[currentIdx].raw = document.getElementById('raw-input').value;
    }

    function handleMonthChange() {
        const newMonth = document.getElementById('inp-mes').value;
        if (currentIdx === 0) weeks.forEach(w => w.mes = newMonth);
        else weeks[currentIdx].mes = newMonth;
        saveCurrentData();
        autoProcess();
    }

    function autoProcess() {
        const rawText = document.getElementById('raw-input').value;
        const refBase = document.getElementById('inp-ref-base').value;
        const mes = document.getElementById('inp-mes').value;

        if (!rawText.trim()) {
            document.getElementById('preview-area').innerHTML = "";
            document.getElementById('json-output').value = "";
            weeks[currentIdx].processed = null;
            return;
        }

        let lines = rawText.split(/\n/).map(l => l.trim()).filter(l => l.length > 0);
        const tituloSemana = lines[0];
        lines.shift();

        let refFinal = !refBase.trim() ? 
            mes.charAt(0).toUpperCase() + mes.slice(1) : 
            (refBase.toLowerCase().includes("pp.") ? refBase.replace(/pp\./i, `${mes} pp.`) : `${refBase} ${mes}`);

        const result = { "referencia": refFinal, "titulo": tituloSemana, "conteudo": [] };

        let isFooterMode = false;
        let globalCounter = 1;
        let initialBlock = [];
        let sectionStarted = false;

        const regexes = {
            tesouros: /TESOUROS DA PALAVRA DE DEUS/i,
            ministerio: /EMPENHE-SE NO MINISTÉRIO/i,
            viver: /VIVER COMO CRISTÃOS/i,
            rodape: /Comentários finais/i,
            numbered: /^(\d+)\.\s+(.*)/,
            duration: /\s*\(\d+\s*min\.?\)/gi,
            cantico: /^Cântico\s+\d+/i,
            // Detetar descrições de partes (Discurso, Consideração, Vídeo, etc)
            partDesc: /^(Discurso|Consideração|Vídeo|Leitura|Análise|Demonstração|Conversa|Perguntas e respostas|Elogie|Sugestão)/i
        };

        lines.forEach(line => {
            // 1. Limpar minutos primeiro
            line = line.replace(regexes.duration, '').trim();
            if (!line || line.toLowerCase().startsWith("a sua resposta")) return;

            // 2. Detetar Secções de Cores
            if (regexes.tesouros.test(line)) {
                if (initialBlock.length > 0) {
                    result.conteudo.push({ "tipo": "subtema", "texto": initialBlock.join("\n") });
                    initialBlock = [];
                }
                result.conteudo.push({ "tipo": "subtema", "texto": "💎 TESOUROS DA PALAVRA DE DEUS" });
                sectionStarted = true;
                return;
            }
            if (regexes.ministerio.test(line)) {
                result.conteudo.push({ "tipo": "subtema", "texto": "🌾 EMPENHE-SE NO MINISTÉRIO" });
                return;
            }
            if (regexes.viver.test(line)) {
                result.conteudo.push({ "tipo": "subtema", "texto": "🐑 VIVER COMO CRISTÃOS" });
                return;
            }

            // 3. Rodapé
            if (regexes.rodape.test(line)) isFooterMode = true;
            if (isFooterMode) {
                result.conteudo.push({ "tipo": "rodape", "texto": line });
                return;
            }

            // 4. Cânticos e Itens Numerados (Sempre Subtemas)
            if (regexes.cantico.test(line)) {
                result.conteudo.push({ "tipo": "subtema", "texto": line });
                return;
            }

            const numMatch = line.match(regexes.numbered);
            if (sectionStarted && numMatch) {
                result.conteudo.push({ "tipo": "subtema", "texto": line });
                return;
            }

            // 5. NOVA REGRA: Detetar descrição da parte como Subtema
            if (sectionStarted && regexes.partDesc.test(line)) {
                result.conteudo.push({ "tipo": "subtema", "texto": line });
                return;
            }

            // 6. Restante (Bloco inicial ou Parágrafos com número)
            if (!sectionStarted) {
                initialBlock.push(line);
            } else {
                result.conteudo.push({
                    "tipo": "paragrafo",
                    "texto": line,
                    "numero_ref": (globalCounter++).toString()
                });
            }
        });

        weeks[currentIdx].processed = result;
        renderPreview(result);
        document.getElementById('json-output').value = JSON.stringify(result, null, 2);
    }

    function renderPreview(data) {
        const div = document.getElementById('preview-area');
        let html = `<h3 style="color:white">${data.titulo}</h3><small style='color:#666'>${data.referencia}</small><br>`;
        data.conteudo.forEach(bloco => {
            if (bloco.tipo === 'subtema') html += `<div class="block-subtema">${bloco.texto.replace(/\n/g, '<br>')}</div>`;
            else if (bloco.tipo === 'rodape') html += `<div class="block-rodape">${bloco.texto}</div>`;
            else html += `<div class="block-paragrafo"><span class="ref-num">${bloco.numero_ref || ''}</span><div>${bloco.texto}</div></div>`;
        });
        div.innerHTML = html;
    }

    function finalizeAll() {
        saveCurrentData();
        const finalArticles = weeks.filter(w => w.processed !== null).map(w => w.processed);
        if (finalArticles.length === 0) { alert("Nenhuma semana processada!"); return; }
        const jsonStr = JSON.stringify({ "artigos": finalArticles }, null, 4);
        navigator.clipboard.writeText(jsonStr).then(() => alert(`✅ Copiado! (${finalArticles.length} semanas)`));
    }

    ['raw-input', 'inp-ref-base'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
            saveCurrentData();
            autoProcess();
            initTabs();
        });
    });

    initTabs();
</script>

</body>
</html>
